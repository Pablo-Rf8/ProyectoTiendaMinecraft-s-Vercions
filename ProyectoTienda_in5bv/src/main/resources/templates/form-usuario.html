<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MINECRAFT - FORMULARIO JUGADOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <script th:src="@{/js/main.js}" defer></script>
</head>
<body>

<div class="titulo-contenedor">
    <h2 th:text="${titulo}"></h2>
    <span class="splash-text"></span>
</div>

<form th:action="@{/usuarios/guardar}" th:object="${usuario}" method="post">
    <input type="hidden" th:field="*{idUsuario}" />

    <label>NOMBRE:</label>
    <input type="text" th:field="*{nombreUsu}" required />

    <label>APELLIDO:</label>
    <input type="text" th:field="*{apellidoUsu}" required />

    <label>EDAD:</label>
    <input type="number" th:field="*{edadUsu}" required />

    <button type="submit" style="margin-bottom: 0;">GUARDAR DATOS</button>
</form>

<a th:href="@{/usuarios}">[ CANCELAR OPERACIÓN ]</a>

</body>
</html>
