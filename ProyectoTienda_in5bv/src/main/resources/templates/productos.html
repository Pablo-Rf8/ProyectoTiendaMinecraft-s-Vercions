<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MINECRAFT - PRODUCTOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <script th:src="@{/js/main.js}" defer></script>
</head>
<body>
<div class="titulo-contenedor">
    <h2>Inventario de Ítems</h2>
    <span class="splash-text"></span>
</div>

<a th:href="@{/productos/nuevo}" class="boton-retro" style="max-width: 800px; width: 95%;">+ CRAFTEAR PRODUCTO</a>

<div class="contenedor-tabla">
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>ÍTEM</th>
            <th>PRECIO</th>
            <th>STOCK</th>
            <th>CATEGORÍA</th>
            <th>ACCIONES</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${listaProductos}">
            <td th:text="${p.idProducto}"></td>
            <td th:text="${p.nombreProducto}"></td>
            <td th:text="${'Emeralds ' + p.precioProducto}"></td>
            <td th:text="${p.stock}"></td>
            <td th:text="${p.categoria.nombreCategoria}"></td>
            <td>
                <a th:href="@{/productos/editar/{id}(id=${p.idProducto})}" style="color:#FFFF55; background:none; border:none; padding:0; margin:0;">[EDIT]</a>
                <span style="color: #555555;"> | </span>
                <a th:href="@{/productos/eliminar/{id}(id=${p.idProducto})}" style="color:#FF5555; background:none; border:none; padding:0; margin:0;">[DELETE]</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<a th:href="@{/home}">[ VOLVER AL MENÚ ]</a>
</body>
</html>
