<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MINECRAFT - FORM CATEGORIA</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <script th:src="@{/js/main.js}" defer></script>
</head>
<body>
<div class="titulo-contenedor">
    <h2 th:text="${titulo}"></h2>
    <span class="splash-text"></span>
</div>

<form th:action="@{/categorias/guardar}" th:object="${categoria}" method="post">
    <input type="hidden" th:field="*{idCategoria}" />

    <label>NOMBRE CATEGORÍA:</label>
    <input type="text" th:field="*{nombreCategoria}" required />

    <label>DESCRIPCIÓN:</label>
    <input type="text" th:field="*{descripcionCategoria}" />

    <button type="submit" style="margin-bottom: 0;">CRAFTEAR CATEGORÍA</button>
</form>

<a th:href="@{/categorias}">[ CANCELAR ]</a>
</body>
</html>
